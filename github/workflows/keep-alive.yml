name: Supabase Keep-Alive Ping

on:
  schedule:
    # Runs every 4 days at midnight UTC to prevent the 7-day free tier pause
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Allows you to manually trigger a test ping anytime from the GitHub UI

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Request to Database
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          